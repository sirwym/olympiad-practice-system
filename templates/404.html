<!DOCTYPE html>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',

<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- 主体内容 -->

        <div class="text-center">
            <img src="https://cdn.jsdelivr.net/gh/sirwym/olympiad-practice-system@main/assets/logo.png" onerror="this.onerror=null;this.src='/assets/logo.png'" alt="Logo" class="w-20 h-20 rounded-2xl mx-auto mb-6 opacity-80">

                </svg>
                返回首页
            </a>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="max-w-5xl mx-auto px-4 py-6 text-center">
        <p class="text-xs text-gray-400">静态生成 · 数据本地存储 · 无需服务器 · 离线可用</p>
    </footer>

</body>
</html>
