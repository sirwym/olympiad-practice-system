name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 如果你的主分支叫 master，请修改为 "master"

# 核心权限配置：必须允许写入 Pages 和获取 ID 令牌
permissions:
  contents: read
  pages: write
  id-token: write

# 2026 年 GitHub Actions 环境强制要求
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else 
            # 如果没找到 requirements.txt，安装默认需要的库
            pip install jinja2 markdown-it-py python-frontmatter jsmin
          fi

      - name: Build static files
        run: |
          # 1. 运行你的主构建脚本生成 dist 目录
          python build.py
          
          # 2. 处理自定义域名：如果根目录有 CNAME 文件，将其拷贝进 dist
          if [ -f CNAME ]; then
            cp CNAME dist/
            echo "CNAME file copied to dist/"
          else
            echo "No CNAME file found, skipping."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 必须指向 build.py 实际生成 HTML 的目录
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4