name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# 确保有权限发布到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 2026 年环境强制要求使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # 关键修正：这里改成了点
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install jinja2 markdown-it-py python-frontmatter

      - name: Build static files
        run: |
          python build.py
          # 如果你还没有创建 CNAME 文件，可以先注释掉下面这行，或者在本地创建一个
          [ -f CNAME ] && cp CNAME dist/ || echo "No CNAME file found, skipping."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 对应 build.py 生成的目录

      - name: Deploy to GitHub Pages
        id: deployment # 这里的 ID 必须和上面 url 里的引用一致
        uses: actions/deploy-pages@v4